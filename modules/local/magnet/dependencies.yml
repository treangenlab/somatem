# Magnet dependancies
# Specific in readme but no conda env was found in the MAGnet repo
# Env made by PK: 30/Jun/25

name: magnet
channels:
    - conda-forge
    - bioconda
dependencies:
    - python=3.9 # try 3.9.19=h0755675_0_cpython
    - ncbi-datasets-cli=17.1.0 # updated for request rate control (prevents timeout by going slower)
    - minimap2=2.24  # try 2.28=he4a0461_3
    - samtools=1.15.1 # try 1.20=h50ea8bc_1
    - biopython
    - pandas
    - ete3=3.1.2 # try 3.1.3=pyhd8ed1ab_0
    - bwa=0.7.17 # try 0.7.18=he4a0461_1
    - scikit-learn=0.23.2 # added by PK ; try 0.23.2=py39hf3c863f_3
    - numpy=1.23.5 # added by PK
    - fastani # added by PK

# notes on package list:
# packages mentioned in magnet readme (with version numbers)
    # Python 3.9
    # NCBI Datasets v15.27.1
    # Minimap2 v2.24-r1122
    # Samtools v1.15.1
    # Biopython
    # Pandas
    # Ete3 v3.1.2
    # BWA v0.7.17
# notes: scikit-learn and fastani is not in the readme but is required by the code
#   - scikit-learn: version: 0.23.2 works ; later versions need to replace `affinity` with `metric` in the parameters of `AgglomerativeClustering`
# version numbers next to packages are the ones that worked for Eddy Huang (Mimic directory)
