# Magnet dependancies
# Specific in readme but no conda env was found in the MAGnet repo
# Env made by PK: 30/Jun/25

# packages mentioned (with version numbers; I omitted versions to use the latest ones)
    # Python 3.9
    # NCBI Datasets v15.27.1
    # Minimap2 v2.24-r1122
    # Samtools v1.15.1
    # Biopython
    # Pandas
    # Ete3 v3.1.2
    # BWA v0.7.17

name: magnet
channels:
    - conda-forge
    - bioconda
dependencies:
    - python=3.9
    - ncbi-datasets-cli=15.27.1
    - minimap2=2.24  
    - samtools=1.15.1
    - biopython
    - pandas
    - ete3=3.1.2
    - bwa=0.7.17
    - scikit-learn
    - fastani # added by PK